<!DOCTYPE html>
<html>
<head>
    <title>CROT [Chat Routing Offline Tools]</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; background: #343541; color: white; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #202123; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #4d4d4f; }
        .sidebar h3 { margin-top: 0; color: #19c37d; }
        .sidebar label { font-size: 12px; color: #acacbe; }
        .sidebar input, .sidebar select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #4d4d4f; background: #343541; color: white; }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* CHAT BOX */
        .chat-container { flex: 1; overflow-y: auto; padding: 40px 15% 100px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 80%; padding: 15px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; position: relative; }
        .user { align-self: flex-end; background: #0b93f6; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #444654; color: white; border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-bottom: 10px; display: block; }

        /* LOADING ANIMATION (MINECRAFT STYLE) */
        .loading { display: none; flex-direction: column; align-items: center; gap: 20px; margin: 30px 0; align-self: flex-start; width: 100%; padding: 20px 0; }
        
        /* Perbesar wrapper agar saat rotasi diagonal tidak terpotong (diagonal 40px ~ 57px) */
        .cube-wrapper { width: 80px; height: 80px; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
        
        .cube {
            width: 40px; height: 40px; position: relative; transform-style: preserve-3d;
            animation: rotateCube 3s infinite linear;
        }
        .face {
            position: absolute; width: 40px; height: 40px; border: 2px solid #1a1a1a;
            image-rendering: pixelated; /* Biar kerasa retro/minecraft */
        }
        /* Tekstur Grass Block Sederhana */
        .top    { background: #55aa33; transform: rotateX(90deg) translateZ(20px); }
        .bottom { background: #5d4037; transform: rotateX(-90deg) translateZ(20px); }
        .front  { background: #8d6e63; transform: translateZ(20px); border-top: 5px solid #55aa33; }
        .back   { background: #8d6e63; transform: rotateY(180deg) translateZ(20px); border-top: 5px solid #55aa33; }
        .left   { background: #8d6e63; transform: rotateY(-90deg) translateZ(20px); border-top: 5px solid #55aa33; }
        .right  { background: #8d6e63; transform: rotateY(90deg) translateZ(20px); border-top: 5px solid #55aa33; }

        @keyframes rotateCube {
            0% { transform: rotateX(0) rotateY(0); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        #thinkingText { font-family: 'Courier New', Courier, monospace; color: #19c37d; font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* INPUT AREA */
        .input-wrapper { position: absolute; bottom: 0; width: 100%; padding: 20px 15%; background: linear-gradient(transparent, #343541 20%); }
        .input-area { background: #40414f; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; height: 45px; padding: 10px; outline: none; font-size: 16px; }
        
        .btn-icon { background: #19c37d; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-icon:hover { background: #1aab6f; }
        .btn-file { background: #545668; }

        #imagePreview { display: none; position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden; margin-left: 10px; }
        #imagePreview img { width: 100%; height: 100%; object-fit: cover; }
        #imagePreview .close { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.5); color: white; cursor: pointer; padding: 2px 5px; font-size: 12px; }

        /* STATS PANEL */
        .stats-panel { width: 240px; background: #202123; border-left: 1px solid #4d4d4f; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .stat-item { margin-bottom: 15px; }
        .stat-label { font-size: 12px; color: #acacbe; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .progress-bar { width: 100%; height: 8px; background: #4d4d4f; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #19c37d; width: 0%; transition: width 0.5s; }
        .usage-box { background: #343541; padding: 15px; border-radius: 10px; border: 1px solid #4d4d4f; }
        .usage-box p { margin: 5px 0; font-size: 13px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>⚙️ Setup</h3>
        <label>Provider</label>
        <select id="provider" onchange="loadModels()">
            <option value="ollama">Ollama</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
        </select>
        <label>Model</label>
        <select id="model">
            <option value="">Loading models...</option>
        </select>
        <label>API Key</label>
        <input id="api_key" type="password" placeholder="optional for local">
    </div>

    <div class="main">
        <div class="chat-container" id="chatBox">
            <div class="msg bot">Hello! I can now see images. Try uploading one!</div>
        </div>

        <div class="loading" id="loading">
            <div class="cube-wrapper">
                <div class="cube">
                    <div class="face top"></div>
                    <div class="face bottom"></div>
                    <div class="face front"></div>
                    <div class="face back"></div>
                    <div class="face left"></div>
                    <div class="face right"></div>
                </div>
            </div>
            <div id="thinkingText">Thinking...</div>
        </div>

        <div class="input-wrapper">
            <div id="imagePreview">
                <img id="previewImg" src="">
                <div class="close" onclick="clearImage()">X</div>
            </div>
            <div class="input-area">
                <div class="input-row">
                    <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
                    <button class="btn-icon btn-file" onclick="document.getElementById('fileInput').click()">📷</button>
                    <textarea id="message" placeholder="Type your message here..."></textarea>
                    <button class="btn-icon" onclick="sendChat()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-panel">
        <h3>📊 System</h3>
        <div class="stat-item">
            <div class="stat-label"><span>CPU</span><span id="cpuVal">0%</span></div>
            <div class="progress-bar"><div id="cpuBar" class="progress-fill"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>RAM</span><span id="ramVal">0%</span></div>
            <div class="progress-bar"><div id="ramBar" class="progress-fill"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>GPU</span><span id="gpuVal">0%</span></div>
            <div class="progress-bar"><div id="gpuBar" class="progress-fill"></div></div>
        </div>

        <h3>📈 Tokens</h3>
        <div class="usage-box">
            <p>In: <b id="inTokens">0</b></p>
            <p>Out: <b id="outTokens">0</b></p>
            <p>Total: <b id="totalTokens">0</b></p>
            <hr style="border:0; border-top:1px solid #4d4d4f">
            <p>Cost: <span style="color:#19c37d">$<b id="costVal">0.00</b></span></p>
        </div>
    </div>

    <script>
        let selectedImageBase64 = null;
        let chatHistory = []; // Tambahkan ini agar memory bisa berjalan

        async function loadModels() {
            const provider = document.getElementById("provider").value;
            const modelSelect = document.getElementById("model");
            modelSelect.innerHTML = "<option>Loading...</option>";

            try {
                const res = await fetch(`/models/${provider}`);
                const models = await res.json();
                modelSelect.innerHTML = "";
                
                if (models.length === 0) {
                    modelSelect.innerHTML = "<option value=''>No models found</option>";
                    return;
                }

                models.forEach(m => {
                    const opt = document.createElement("option");
                    opt.value = m;
                    opt.innerText = m;
                    modelSelect.appendChild(opt);
                });
            } catch (e) {
                modelSelect.innerHTML = "<option value=''>Error loading models</option>";
            }
        }

        // Load models on startup
        window.onload = loadModels;

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    document.getElementById('previewImg').src = selectedImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImage() {
            selectedImageBase64 = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        async function sendChat() {
            const msgInput = document.getElementById("message");
            const message = msgInput.value.trim();
            if (!message && !selectedImageBase64) return;

            const chatBox = document.getElementById("chatBox");
            const loading = document.getElementById("loading");

            // Simpan gambar saat ini sebelum dibersihkan
            const currentImg = selectedImageBase64;

            // Tampilkan Pesan User (Kanan)
            const userDiv = document.createElement("div");
            userDiv.className = "msg user";
            if (currentImg) {
                const img = document.createElement("img");
                img.src = currentImg;
                userDiv.appendChild(img);
            }
            if (message) {
                const textSpan = document.createElement("span");
                textSpan.innerText = message;
                userDiv.appendChild(textSpan);
            }
            chatBox.appendChild(userDiv);

            // Reset Input
            msgInput.value = "";
            clearImage();
            
            // Show Loading & Scroll
            loading.style.display = "flex";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Minecraft phrases
            const phrases = ["Mining data...", "Smelting tokens...", "Crafting response...", "Mining diamonds...", "Building logic...", "Defeating creepers..."];
            let phraseIdx = 0;
            const phraseInterval = setInterval(() => {
                document.getElementById("thinkingText").innerText = phrases[phraseIdx % phrases.length];
                phraseIdx++;
            }, 1000);

            try {
                const payload = {
                    provider: document.getElementById("provider").value,
                    model: document.getElementById("model").value,
                    api_key: document.getElementById("api_key").value,
                    message: message,
                    image: currentImg,
                    history: chatHistory
                };

                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.error || "Server responded with error");
                }

                const data = await res.json();
                clearInterval(phraseInterval);
                loading.style.display = "none";

                const botDiv = document.createElement("div");
                botDiv.className = "msg bot";
                botDiv.innerText = data.reply;
                chatBox.appendChild(botDiv);

                // Update Memory
                chatHistory.push({ role: "user", content: message });
                chatHistory.push({ role: "assistant", content: data.reply });
                if (chatHistory.length > 20) chatHistory.shift();

                // Update Stats
                document.getElementById("inTokens").innerText = data.input_tokens;
                document.getElementById("outTokens").innerText = data.output_tokens;
                document.getElementById("totalTokens").innerText = data.total_tokens;
                document.getElementById("costVal").innerText = data.estimated_cost;

            } catch (e) {
                clearInterval(phraseInterval);
                loading.style.display = "none";
                
                const errorDiv = document.createElement("div");
                errorDiv.className = "msg bot";
                errorDiv.style.color = "#ff6e6e";
                errorDiv.innerText = "Error: " + e.message;
                chatBox.appendChild(errorDiv);
                console.error("Fetch Error:", e);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Monitoring Sistem tiap 2 detik
        async function updateStats() {
            try {
                const res = await fetch("/system_stats");
                const data = await res.json();
                
                document.getElementById("cpuBar").style.width = data.cpu + "%";
                document.getElementById("cpuVal").innerText = Math.round(data.cpu) + "%";
                
                document.getElementById("ramBar").style.width = data.ram + "%";
                document.getElementById("ramVal").innerText = Math.round(data.ram) + "%";
                
                document.getElementById("gpuBar").style.width = data.gpu + "%";
                document.getElementById("gpuVal").innerText = Math.round(data.gpu) + "%";
            } catch(e) {}
        }
        setInterval(updateStats, 2000);

        // Enter to send
        document.getElementById("message").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        });
    </script>
</body>
</html>
body>
</html>
