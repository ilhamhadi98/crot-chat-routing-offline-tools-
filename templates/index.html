<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROT [Chat Routing Offline Tools]</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --bg-msg-user: #2b2d31;
            --bg-msg-bot: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #acacbe;
            --accent: #8ab4f8;
            --accent-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --border: #444746;
            --input-bg: #1e1f20;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-sidebar: #ffffff;
            --bg-msg-user: #e7eaed;
            --bg-msg-bot: #ffffff;
            --text-main: #1f1f1f;
            --text-sub: #5f6368;
            --accent: #1a73e8;
            --border: #dadce0;
            --input-bg: #ffffff;
            --shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s, border 0.3s, transform 0.2s; }
        
        body { 
            margin: 0; 
            font-family: 'Google Sans', 'Segoe UI', Roboto, sans-serif; 
            height: 100vh; 
            display: flex; 
            background: var(--bg-main); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* SIDEBAR (Responsive) */
        .sidebar { 
            width: 320px; background: var(--bg-sidebar); padding: 25px; 
            display: flex; flex-direction: column; gap: 20px; 
            border-right: 1px solid var(--border); z-index: 1000;
            transition: left 0.3s ease;
        }

        .sidebar h2 { 
            margin: 0; background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; font-size: 26px; font-weight: bold;
        }

        .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
        .sidebar label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar input, .sidebar select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); 
            background: var(--bg-main); color: var(--text-main); font-size: 14px; outline: none;
        }

        .session-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .session-item { 
            padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 13px; 
            color: var(--text-sub); border: 1px solid transparent; transition: all 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .session-item:hover { background: var(--bg-main); color: var(--text-main); border-color: var(--border); }
        .session-item.active { background: var(--bg-main); color: var(--accent); border-color: var(--accent); }

        /* MAIN AREA */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); min-width: 0; }
        
        .top-bar {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .top-bar-left, .top-bar-right { display: flex; gap: 10px; align-items: center; }

        .btn-icon-top {
            background: var(--bg-sidebar); border: 1px solid var(--border);
            color: var(--text-main); width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px;
            box-shadow: var(--shadow);
        }

        .btn-text-top {
            background: var(--bg-sidebar); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px;
        }

        /* CHAT CONTAINER */
        .chat-container { 
            flex: 1; overflow-y: auto; padding: 20px 15% 150px 15%; 
            display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth;
        }

        .msg { max-width: 85%; padding: 18px 22px; border-radius: 24px; line-height: 1.5; font-size: 15px; animation: fadeIn 0.4s ease; position: relative; word-wrap: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--bg-msg-user); color: var(--text-main); border-bottom-right-radius: 4px; box-shadow: var(--shadow); }
        .bot { align-self: flex-start; background: transparent; padding-left: 0; max-width: 95%; }

        .msg-meta { font-size: 10px; color: var(--text-sub); margin-top: 8px; display: flex; gap: 12px; font-family: monospace; opacity: 0.7; }
        .msg-meta b { color: var(--accent); }

        .chat-img-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); max-width: 100%; margin-bottom: 12px; }
        .chat-img-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 12px; box-shadow: var(--shadow); }

        /* LOADING & QUEUE */
        .loading { display: none; flex-direction: column; align-items: center; gap: 10px; margin: 20px 0; align-self: flex-start; }
        .cube-wrapper { width: 40px; height: 40px; perspective: 800px; }
        .cube { width: 20px; height: 20px; position: relative; transform-style: preserve-3d; animation: rotateCube 3s infinite linear; margin: 10px; }
        .face { position: absolute; width: 20px; height: 20px; border: 1px solid rgba(0,0,0,0.1); }
        .top { background: #55aa33; transform: rotateX(90deg) translateZ(10px); }
        .bottom { background: #5d4037; transform: rotateX(-90deg) translateZ(10px); }
        .front { background: #8d6e63; transform: translateZ(10px); border-top: 3px solid #55aa33; }
        .back { background: #8d6e63; transform: rotateY(180deg) translateZ(10px); border-top: 3px solid #55aa33; }
        .left { background: #8d6e63; transform: rotateY(-90deg) translateZ(10px); border-top: 3px solid #55aa33; }
        .right { background: #8d6e63; transform: rotateY(90deg) translateZ(10px); border-top: 3px solid #55aa33; }
        @keyframes rotateCube { 0% { transform: rotateX(0) rotateY(0); } 100% { transform: rotateX(360deg) rotateY(360deg); } }
        #thinkingBox { display: flex; flex-direction: column; align-items: center; }
        #thinkingText { font-size: 9px; font-weight: 900; color: var(--accent); letter-spacing: 2px; }
        #queueStatus { font-size: 8px; color: #ff9800; font-weight: bold; margin-top: 4px; }

        /* INPUT BOX */
        .input-wrapper { position: absolute; bottom: 20px; width: 100%; padding: 0 15%; z-index: 10; }
        .unified-box {
            background: var(--bg-sidebar); border-radius: 28px; border: 1px solid var(--border); 
            box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden;
        }
        .unified-box:focus-within { border-color: var(--accent); }
        #imagePreview { display: none; padding: 15px 20px 5px 20px; gap: 10px; flex-wrap: wrap; }
        .preview-item { position: relative; width: 60px; height: 60px; }
        .preview-item img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }
        .preview-remove {
            position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; 
            border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; 
            justify-content: center; font-size: 10px; cursor: pointer; border: 2px solid var(--bg-sidebar);
        }

        .input-row { padding: 8px 12px 8px 20px; display: flex; align-items: center; gap: 10px; }
        textarea { flex: 1; background: transparent; border: none; color: var(--text-main); resize: none; height: 44px; padding: 12px 0; outline: none; font-size: 16px; font-family: inherit; line-height: 20px; overflow: hidden; }

        .btn-action { width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .btn-attach { background: transparent; color: var(--text-sub); font-size: 20px; }
        .btn-send { background: var(--accent-gradient); color: white; font-size: 18px; }

        /* STATS PANEL */
        .stats-panel { 
            width: 280px; background: var(--bg-sidebar); border-left: 1px solid var(--border); 
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
            transition: right 0.3s ease;
        }
        .stat-card { background: var(--bg-main); padding: 15px; border-radius: 18px; border: 1px solid var(--border); }
        .stat-label { font-size: 10px; font-weight: 800; color: var(--text-sub); margin-bottom: 10px; display: flex; justify-content: space-between; text-transform: uppercase; }
        .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* MOBILE RESPONSIVE LOGIC */
        .menu-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 500; backdrop-filter: blur(4px);
        }

        @media (max-width: 1100px) {
            .chat-container { padding-left: 5%; padding-right: 5%; }
            .input-wrapper { padding-left: 5%; padding-right: 5%; }
        }

        @media (max-width: 900px) {
            .sidebar { position: fixed; left: -320px; height: 100%; }
            .sidebar.active { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .stats-panel { position: fixed; right: -280px; height: 100%; z-index: 1000; }
            .stats-panel.active { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
            .menu-overlay.active { display: block; }
            .chat-container { padding-bottom: 120px; }
            .input-wrapper { bottom: 10px; }
        }

        @media (max-width: 600px) {
            .top-bar { padding: 10px; }
            .sidebar { width: 85%; left: -100%; }
            .msg { max-width: 92%; padding: 15px 18px; font-size: 14px; }
            .btn-text-top { font-size: 11px; padding: 6px 12px; }
            .unified-box { border-radius: 20px; }
            textarea { font-size: 14px; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="menu-overlay" id="overlay" onclick="closeMenus()"></div>

    <div class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🚀 CROT</h2>
            <button class="btn-icon-top" style="background:transparent; border:none; display:none;" id="btnCloseSidebar" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="sidebar-section">
            <label>Provider</label>
            <select id="provider" onchange="loadModels()">
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI</option>
                <option value="gemini">Gemini</option>
            </select>
        </div>
        <div class="sidebar-section">
            <label>Model</label>
            <select id="model"><option value="">Select a model</option></select>
        </div>
        <div class="sidebar-section">
            <label>API Key</label>
            <input id="api_key" type="password" placeholder="••••••••••••">
        </div>
        <label style="margin-top: 10px;">History (SQLite)</label>
        <div class="session-list" id="sessionList"></div>
        <div style="flex: 1;"></div>
        <div style="font-size: 10px; color: var(--text-sub); text-align: center; opacity: 0.5;">CROT v1.3 [RESPONSIVE]</div>
    </div>

    <div class="main">
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="btn-icon-top" onclick="toggleSidebar()">☰</button>
                <button class="btn-text-top" onclick="startNewSession()">+ New</button>
            </div>
            <div class="top-bar-right">
                <button class="btn-icon-top" onclick="toggleTheme()">☀️</button>
                <button class="btn-icon-top" onclick="toggleStats()">📊</button>
            </div>
        </div>

        <div class="chat-container" id="chatBox">
            <div class="msg bot"><b>Responsive Mode Active.</b><br>Try resizing the window or open this on your phone!</div>
        </div>

        <div class="input-wrapper">
            <div class="loading" id="loading">
                <div class="cube-wrapper"><div class="cube"><div class="face top"></div><div class="face bottom"></div><div class="face front"></div><div class="face back"></div><div class="face left"></div><div class="face right"></div></div></div>
                <div id="thinkingBox">
                    <div id="thinkingText">ANALYZING...</div>
                    <div id="queueStatus"></div>
                </div>
            </div>

            <div class="unified-box">
                <div id="imagePreview"></div>
                <div class="input-row">
                    <input type="file" id="fileInput" hidden accept="image/*" multiple onchange="handleImage(this)">
                    <button class="btn-action btn-attach" onclick="document.getElementById('fileInput').click()">📎</button>
                    <textarea id="message" placeholder="Ask me anything..." oninput="autoGrow(this)"></textarea>
                    <button class="btn-action btn-send" onclick="sendChat()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="stats-panel" id="statsPanel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>📊 Status</h3>
            <button class="btn-icon-top" style="background:transparent; border:none;" onclick="toggleStats()">✕</button>
        </div>
        <div class="stat-card"><div class="stat-label"><span>CPU</span><span id="cpuVal">0%</span></div><div class="progress-bar"><div id="cpuBar" class="progress-fill"></div></div></div>
        <div class="stat-card"><div class="stat-label"><span>RAM</span><span id="ramVal">0%</span></div><div class="progress-bar"><div id="ramBar" class="progress-fill"></div></div></div>
        <div class="stat-card"><div class="stat-label"><span>GPU</span><span id="gpuVal">0%</span></div><div class="progress-bar"><div id="gpuBar" class="progress-fill"></div></div></div>
        <h3>📈 Global</h3>
        <div class="stat-card">
            <div class="stat-label"><span>Tokens</span><span id="totalTokens">0</span></div>
            <div class="stat-label"><span>Cost</span><span style="color:#19c37d;">$<span id="costVal">0.000000</span></span></div>
        </div>
    </div>

    <script>
        let selectedImages = [];
        let chatHistory = [];
        let currentSessionName = "Session_" + new Date().getTime();
        let activeRequests = 0;

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        function toggleStats() {
            document.getElementById("statsPanel").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        function closeMenus() {
            document.getElementById("sidebar").classList.remove("active");
            document.getElementById("statsPanel").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute("data-theme") === "dark";
            body.setAttribute("data-theme", isDark ? "light" : "dark");
            event.target.innerText = isDark ? "🌙" : "☀️";
        }

        function autoGrow(element) {
            element.style.height = "44px";
            element.style.height = (element.scrollHeight) + "px";
            element.style.overflowY = element.scrollHeight > 200 ? "auto" : "hidden";
        }

        async function loadModels() {
            const p = document.getElementById("provider");
            const m = document.getElementById("model");
            if (!p || !m) return;
            m.innerHTML = "<option>Loading...</option>";
            try {
                const res = await fetch(`/models/${p.value}`);
                const models = await res.json();
                m.innerHTML = "";
                if (!models || models.length === 0) { m.innerHTML = "<option value=''>No models</option>"; return; }
                models.forEach(model => {
                    const opt = document.createElement("option");
                    opt.value = model; opt.innerText = model; m.appendChild(opt);
                });
            } catch (e) { m.innerHTML = "<option value=''>Error</option>"; }
        }

        async function updateSessionList() {
            try {
                const res = await fetch("/sessions");
                const sessions = await res.json();
                const list = document.getElementById("sessionList");
                list.innerHTML = sessions.length ? "" : "<div class='session-item'>No sessions</div>";
                sessions.forEach(s => {
                    const item = document.createElement("div");
                    item.className = "session-item " + (s.name === currentSessionName ? "active" : "");
                    item.innerText = s.name;
                    item.onclick = () => { loadSession(s.name); if(window.innerWidth < 900) closeMenus(); };
                    list.appendChild(item);
                });
            } catch(e) {}
        }

        function startNewSession() {
            currentSessionName = "Session_" + new Date().getTime();
            chatHistory = [];
            document.getElementById("chatBox").innerHTML = "<div class='msg bot'><b>New Session Started.</b></div>";
            updateSessionList();
            if(window.innerWidth < 900) closeMenus();
        }

        async function loadSession(name) {
            try {
                const res = await fetch(`/load_session/${name}`);
                const history = await res.json();
                chatHistory = history;
                currentSessionName = name;
                const chatBox = document.getElementById("chatBox");
                chatBox.innerHTML = `<div class='msg bot'><b>Loaded Session:</b> ${name}</div>`;
                history.forEach(msg => {
                    const div = document.createElement("div");
                    div.className = `msg ${msg.role === 'user' ? 'user' : 'bot'}`;
                    div.innerText = msg.content;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
                updateSessionList();
            } catch(e) { alert("Load failed"); }
        }

        window.onload = () => { loadModels(); updateSessionList(); };

        function handleImage(input) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => { selectedImages.push(e.target.result); renderPreviews(); };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function renderPreviews() {
            const container = document.getElementById('imagePreview');
            container.innerHTML = '';
            if (selectedImages.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'flex';
            selectedImages.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `<img src="${img}"><div class="preview-remove" onclick="removeImage(${index})">✕</div>`;
                container.appendChild(item);
            });
        }

        function removeImage(index) { selectedImages.splice(index, 1); renderPreviews(); }

        async function sendChat() {
            const msgInput = document.getElementById("message");
            const message = msgInput.value.trim();
            if (!message && selectedImages.length === 0) return;
            const chatBox = document.getElementById("chatBox");
            const loading = document.getElementById("loading");
            const qStatus = document.getElementById("queueStatus");
            const currentImages = [...selectedImages];

            activeRequests++;
            if (activeRequests > 1) qStatus.innerText = `Waiting (${activeRequests-1} pending)...`;
            else qStatus.innerText = "";

            const userDiv = document.createElement("div");
            userDiv.className = "msg user";
            if (currentImages.length > 0) {
                const imgGrid = document.createElement("div");
                imgGrid.className = "chat-img-grid";
                currentImages.forEach(img => { const el = document.createElement("img"); el.src = img; imgGrid.appendChild(el); });
                userDiv.appendChild(imgGrid);
            }
            if (message) { const textSpan = document.createElement("span"); textSpan.innerText = message; userDiv.appendChild(textSpan); }
            chatBox.appendChild(userDiv);

            msgInput.value = ""; msgInput.style.height = "44px";
            selectedImages = []; renderPreviews();
            loading.style.display = "flex";
            chatBox.scrollTop = chatBox.scrollHeight;

            const botDiv = document.createElement("div");
            botDiv.className = "msg bot";
            const botTextSpan = document.createElement("span");
            botDiv.appendChild(botTextSpan);
            chatBox.appendChild(botDiv);

            const phrases = ["MINING...", "CRAFTING..."];
            let phraseIdx = 0;
            const phraseInterval = setInterval(() => { document.getElementById("thinkingText").innerText = phrases[phraseIdx % phrases.length]; phraseIdx++; }, 1000);

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        provider: document.getElementById("provider").value,
                        model: document.getElementById("model").value,
                        api_key: document.getElementById("api_key").value,
                        message: message,
                        images: currentImages,
                        history: chatHistory,
                        session_name: currentSessionName
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullReply = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const data = JSON.parse(line.substring(6));
                            if (data.error) throw new Error(data.error);
                            if (data.text) { fullReply += data.text; botTextSpan.innerText = fullReply; chatBox.scrollTop = chatBox.scrollHeight; }
                            if (data.done) {
                                const metaDiv = document.createElement("div");
                                metaDiv.className = "msg-meta";
                                metaDiv.innerHTML = `⏱ <b>${data.process_time}s</b> | 🪙 <b>${data.tokens}</b> | 💰 $<b>${data.cost}</b>`;
                                botDiv.appendChild(metaDiv);
                                chatHistory.push({ role: "user", content: message });
                                chatHistory.push({ role: "assistant", content: fullReply });
                            }
                        }
                    }
                }
            } catch (e) { 
                botTextSpan.style.color = "#ff6e6e"; botTextSpan.innerText = "Error: " + e.message;
            } finally {
                clearInterval(phraseInterval);
                activeRequests--;
                if (activeRequests === 0) { loading.style.display = "none"; qStatus.innerText = ""; }
                updateSessionList();
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        async function updateStats() {
            try {
                const res = await fetch("/system_stats");
                const data = await res.json();
                document.getElementById("cpuBar").style.width = data.cpu + "%";
                document.getElementById("cpuVal").innerText = Math.round(data.cpu) + "%";
                document.getElementById("ramBar").style.width = data.ram + "%";
                document.getElementById("ramVal").innerText = Math.round(data.ram) + "%";
                document.getElementById("gpuBar").style.width = data.gpu + "%";
                document.getElementById("gpuVal").innerText = Math.round(data.gpu) + "%";
                document.getElementById("totalTokens").innerText = data.global_tokens;
                document.getElementById("costVal").innerText = data.global_cost.toFixed(6);
            } catch(e) {}
        }
        setInterval(updateStats, 2000);

        document.getElementById("message").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
        });
    </script>
</body>
</html>
