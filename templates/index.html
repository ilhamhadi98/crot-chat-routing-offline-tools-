<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROT [Chat Routing Offline Tools]</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --bg-msg-user: #2b2d31;
            --bg-msg-bot: #1e1f20;
            --text-main: #e3e3e3;
            --text-sub: #acacbe;
            --accent: #8ab4f8;
            --accent-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --border: #444746;
            --input-bg: #1e1f20;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-sidebar: #ffffff;
            --bg-msg-user: #e7eaed;
            --bg-msg-bot: #ffffff;
            --text-main: #1f1f1f;
            --text-sub: #5f6368;
            --accent: #1a73e8;
            --border: #dadce0;
            --input-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        
        body { 
            margin: 0; 
            font-family: 'Google Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            background: var(--bg-main); 
            color: var(--text-main); 
            overflow: hidden;
        }

        .sidebar { 
            width: 300px; 
            background: var(--bg-sidebar); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            border-right: 1px solid var(--border);
            z-index: 10;
        }

        .sidebar h2 { 
            margin: 0; 
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
        .sidebar label { font-size: 13px; font-weight: 500; color: var(--text-sub); }
        .sidebar input, .sidebar select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); 
            background: var(--bg-main); color: var(--text-main); font-size: 14px; outline: none;
        }
        .sidebar input:focus, .sidebar select:focus { border-color: var(--accent); }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg-main); }
        
        .theme-toggle {
            position: absolute; top: 20px; right: 20px; background: var(--bg-sidebar); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px;
            font-weight: bold; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow); z-index: 100;
        }

        .chat-container { flex: 1; overflow-y: auto; padding: 60px 15% 150px 15%; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }

        .msg { max-width: 85%; padding: 18px 25px; border-radius: 24px; line-height: 1.6; font-size: 16px; position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--bg-msg-user); color: var(--text-main); border-bottom-right-radius: 4px; box-shadow: var(--shadow); }
        .bot { align-self: flex-start; background: transparent; color: var(--text-main); padding-left: 0; max-width: 95%; }
        .msg img { max-width: 300px; border-radius: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }

        .loading { display: none; flex-direction: column; align-items: center; gap: 20px; margin: 20px 0; align-self: flex-start; }
        .cube-wrapper { width: 60px; height: 60px; perspective: 1000px; }
        .cube { width: 30px; height: 30px; position: relative; transform-style: preserve-3d; animation: rotateCube 3s infinite linear; margin: 15px; }
        .face { position: absolute; width: 30px; height: 30px; border: 1px solid rgba(0,0,0,0.2); }
        .top    { background: #55aa33; transform: rotateX(90deg) translateZ(15px); }
        .bottom { background: #5d4037; transform: rotateX(-90deg) translateZ(15px); }
        .front  { background: #8d6e63; transform: translateZ(15px); border-top: 4px solid #55aa33; }
        .back   { background: #8d6e63; transform: rotateY(180deg) translateZ(15px); border-top: 4px solid #55aa33; }
        .left   { background: #8d6e63; transform: rotateY(-90deg) translateZ(15px); border-top: 4px solid #55aa33; }
        .right  { background: #8d6e63; transform: rotateY(90deg) translateZ(15px); border-top: 4px solid #55aa33; }
        @keyframes rotateCube { 0% { transform: rotateX(0) rotateY(0); } 100% { transform: rotateX(360deg) rotateY(360deg); } }
        #thinkingText { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }

        .input-wrapper { position: absolute; bottom: 30px; width: 100%; padding: 0 15%; }
        .input-area { background: var(--bg-sidebar); border-radius: 32px; padding: 8px 20px; display: flex; align-items: center; gap: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        textarea { flex: 1; background: transparent; border: none; color: var(--text-main); resize: none; height: 40px; padding: 10px 0; outline: none; font-size: 16px; font-family: inherit; line-height: 20px; overflow: hidden; }

        .btn-circle { background: var(--accent-gradient); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 18px; flex-shrink: 0; }
        .btn-ghost { background: transparent; border: none; color: var(--text-sub); cursor: pointer; font-size: 20px; padding: 5px; border-radius: 50%; }

        #imagePreview { display: none; position: absolute; bottom: 100%; left: 20px; background: var(--bg-sidebar); padding: 8px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: var(--shadow); }
        #imagePreview img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .preview-close { position: absolute; top: -10px; right: -10px; background: #ff4d4d; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }

        .stats-panel { width: 280px; background: var(--bg-sidebar); border-left: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; gap: 25px; }
        .stat-card { background: var(--bg-main); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-label { font-size: 12px; font-weight: bold; color: var(--text-sub); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .usage-list { list-style: none; padding: 0; margin: 15px 0 0 0; }
        .usage-list li { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-top: 1px solid var(--border); }
        .usage-list b { color: var(--accent); }
    </style>
</head>
<body data-theme="dark">
    <div class="sidebar">
        <h2>🚀 CROT</h2>
        <div class="sidebar-section">
            <label>Provider</label>
            <select id="provider" onchange="loadModels()">
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI</option>
                <option value="gemini">Gemini</option>
            </select>
        </div>
        <div class="sidebar-section">
            <label>Model</label>
            <select id="model"><option value="">Select a model</option></select>
        </div>
        <div class="sidebar-section">
            <label>API Key</label>
            <input id="api_key" type="password" placeholder="••••••••••••">
        </div>
        <div style="flex: 1;"></div>
        <div style="font-size: 11px; color: var(--text-sub); text-align: center;">CROT v1.0</div>
    </div>

    <div class="main">
        <button class="theme-toggle" onclick="toggleTheme()">
            <span id="themeIcon">☀️</span> <span id="themeText">Light Mode</span>
        </button>
        <div class="chat-container" id="chatBox">
            <div class="msg bot"><b>Welcome to CROT!</b><br>How can I assist you today?</div>
        </div>
        <div class="input-wrapper">
            <div id="imagePreview"><div class="preview-close" onclick="clearImage()">✕</div><img id="previewImg" src=""></div>
            <div class="loading" id="loading">
                <div class="cube-wrapper"><div class="cube"><div class="face top"></div><div class="face bottom"></div><div class="face front"></div><div class="face back"></div><div class="face left"></div><div class="face right"></div></div></div>
                <div id="thinkingText">CRAFTING...</div>
            </div>
            <div class="input-area">
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(this)">
                <button class="btn-ghost" onclick="document.getElementById('fileInput').click()">⊕</button>
                <textarea id="message" placeholder="Ask me anything..." oninput="autoGrow(this)"></textarea>
                <button class="btn-circle" onclick="sendChat()">➤</button>
            </div>
        </div>
    </div>

    <div class="stats-panel">
        <h3>📊 System</h3>
        <div class="stat-card">
            <div class="stat-label"><span>CPU</span><span id="cpuVal">0%</span></div>
            <div class="progress-bar"><div id="cpuBar" class="progress-fill"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>RAM</span><span id="ramVal">0%</span></div>
            <div class="progress-bar"><div id="ramBar" class="progress-fill"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label"><span>GPU</span><span id="gpuVal">0%</span></div>
            <div class="progress-bar"><div id="gpuBar" class="progress-fill"></div></div>
        </div>
        <h3>📈 Usage</h3>
        <div class="stat-card">
            <ul class="usage-list">
                <li><span>In</span><b id="inTokens">0</b></li>
                <li><span>Out</span><b id="outTokens">0</b></li>
                <li><span>Total</span><b id="totalTokens">0</b></li>
                <li style="border-top: 2px solid var(--accent); margin-top: 5px;"><span>Cost</span><b style="color: #19c37d;">$<span id="costVal">0.00</span></b></li>
            </ul>
        </div>
    </div>

    <script>
        let selectedImageBase64 = null;
        let chatHistory = [];

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute("data-theme");
            const next = current === "dark" ? "light" : "dark";
            body.setAttribute("data-theme", next);
            document.getElementById("themeIcon").innerText = next === "dark" ? "☀️" : "🌙";
            document.getElementById("themeText").innerText = next === "dark" ? "Light Mode" : "Dark Mode";
        }

        function autoGrow(element) {
            element.style.height = "40px";
            element.style.height = (element.scrollHeight) + "px";
            element.style.overflowY = element.scrollHeight > 200 ? "auto" : "hidden";
        }

        async function loadModels() {
            const provider = document.getElementById("provider").value;
            const modelSelect = document.getElementById("model");
            modelSelect.innerHTML = "<option>Loading...</option>";
            try {
                const res = await fetch(`/models/${provider}`);
                const models = await res.json();
                modelSelect.innerHTML = "";
                if (models.length === 0) { modelSelect.innerHTML = "<option value=''>No models found</option>"; return; }
                models.forEach(m => {
                    const opt = document.createElement("option");
                    opt.value = m; opt.innerText = m; modelSelect.appendChild(opt);
                });
            } catch (e) { modelSelect.innerHTML = "<option value=''>Error</option>"; }
        }

        window.onload = loadModels;

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    selectedImageBase64 = e.target.result;
                    document.getElementById('previewImg').src = selectedImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function clearImage() {
            selectedImageBase64 = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        async function sendChat() {
            const msgInput = document.getElementById("message");
            const message = msgInput.value.trim();
            if (!message && !selectedImageBase64) return;
            const chatBox = document.getElementById("chatBox");
            const loading = document.getElementById("loading");
            const currentImg = selectedImageBase64;

            const userDiv = document.createElement("div");
            userDiv.className = "msg user";
            if (currentImg) { const img = document.createElement("img"); img.src = currentImg; userDiv.appendChild(img); }
            if (message) { const textSpan = document.createElement("span"); textSpan.innerText = message; userDiv.appendChild(textSpan); }
            chatBox.appendChild(userDiv);

            msgInput.value = ""; msgInput.style.height = "40px";
            clearImage(); loading.style.display = "flex";
            chatBox.scrollTop = chatBox.scrollHeight;

            const phrases = ["MINING DATA...", "SMELTING TOKENS...", "CRAFTING RESPONSE..."];
            let phraseIdx = 0;
            const phraseInterval = setInterval(() => {
                document.getElementById("thinkingText").innerText = phrases[phraseIdx % phrases.length];
                phraseIdx++;
            }, 1000);

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        provider: document.getElementById("provider").value,
                        model: document.getElementById("model").value,
                        api_key: document.getElementById("api_key").value,
                        message: message,
                        image: currentImg,
                        history: chatHistory
                    })
                });
                const data = await res.json();
                clearInterval(phraseInterval);
                loading.style.display = "none";
                const botDiv = document.createElement("div");
                botDiv.className = "msg bot";
                if (data.error) { botDiv.style.color = "#ff6e6e"; botDiv.innerText = "Error: " + data.error; }
                else {
                    botDiv.innerText = data.reply;
                    chatHistory.push({ role: "user", content: message });
                    chatHistory.push({ role: "assistant", content: data.reply });
                    if (chatHistory.length > 20) chatHistory.shift();
                    document.getElementById("inTokens").innerText = data.input_tokens;
                    document.getElementById("outTokens").innerText = data.output_tokens;
                    document.getElementById("totalTokens").innerText = data.total_tokens;
                    document.getElementById("costVal").innerText = data.estimated_cost;
                }
                chatBox.appendChild(botDiv);
            } catch (e) { clearInterval(phraseInterval); loading.style.display = "none"; alert("Connection failed"); }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function updateStats() {
            try {
                const res = await fetch("/system_stats");
                const data = await res.json();
                document.getElementById("cpuBar").style.width = data.cpu + "%";
                document.getElementById("cpuVal").innerText = Math.round(data.cpu) + "%";
                document.getElementById("ramBar").style.width = data.ram + "%";
                document.getElementById("ramVal").innerText = Math.round(data.ram) + "%";
                document.getElementById("gpuBar").style.width = data.gpu + "%";
                document.getElementById("gpuVal").innerText = Math.round(data.gpu) + "%";
            } catch(e) {}
        }
        setInterval(updateStats, 2000);

        document.getElementById("message").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        });
    </script>
</body>
</html>
